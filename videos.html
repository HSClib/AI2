<body class="list-page" data-page="videos">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="回到首頁">
      <img src="hsclogo.png" alt="新生醫專圖書館">
      <span>新生醫專圖書館</span>
    </a>
    <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="siteNav">選單</button>
    <nav id="siteNav" class="site-nav" aria-label="主要導覽">
      <a href="index.html">首頁</a>

      <a class="active" href="videos.html">教學影片</a>

      <a href="index.html#ethics">AI倫理</a>
      <a href="https://lib.hsc.edu.tw/" target="_blank" rel="noreferrer">圖書館首頁</a>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <p class="eyebrow">Watch & Learn</p>
      <h1>教學影片</h1>
      <p>整理 AI 入門、Gemini、NotebookLM、Claude 與工作流程應用影片。</p>
    </section>

    <section class="section">
      <div id="videoGrid" class="video-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="visit-counter" data-visit-counter>
      <span>瀏覽人次</span>
      <strong data-visit-number>--</strong>
      <small data-visit-status>載入中</small>
    </div>
    <p>Copyright © 新生學校財團法人新生醫護管理專科學校</p>

  </footer>
  <script src="data.js?v=20260626c"></script>
  <script>
    const videoGrid = document.getElementById("videoGrid");
    const videos = window.AI_RESOURCE_DATA?.videos || [];
    videoGrid.innerHTML = videos.map((video) => `
      <article class="video-card">
        <a class="video-thumb" href="https://www.youtube.com/watch?v=${video.id}" target="_blank" rel="noreferrer" aria-label="播放 ${video.title}">
          <img src="https://i.ytimg.com/vi/${video.id}/hq720.jpg" alt="${video.title}">
          <span class="play-mark">▶</span>
        </a>
      </article>
    `).join("");

    const menuButton = document.querySelector(".menu-toggle");
    const nav = document.getElementById("siteNav");
    menuButton.addEventListener("click", () => {
      const isOpen = nav.classList.toggle("open");
      menuButton.setAttribute("aria-expanded", String(isOpen));
    });
  </script>
  <script src="counter-config.js?v=20260626a"></script>
  <script src="counter.js?v=20260626a"></script>
